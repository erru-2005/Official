<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-label="KEDANTRA wordmark">
  <defs>
    <style>
      .cinzel {
        font-family: "Times New Roman", serif;
      }
    </style>

    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.25" stop-color="#E8ECF0" />
      <stop offset="0.55" stop-color="#B8BEC6" />
      <stop offset="0.8" stop-color="#8A9199" />
      <stop offset="1" stop-color="#D4D9DE" />
    </linearGradient>

    <filter id="softDepth" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.32" />
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.28" />
    </filter>
  </defs>

  <g filter="url(#softDepth)">
    <text
      x="700"
      y="260"
      text-anchor="middle"
      class="cinzel"
      font-size="190"
      font-weight="800"
      fill="none"
      stroke="#07080B"
      stroke-width="14"
      stroke-linejoin="round"
      opacity="0.9"
      letter-spacing="12"
    >
      KEDANTRA
    </text>

    <text
      x="700"
      y="260"
      text-anchor="middle"
      class="cinzel"
      font-size="190"
      font-weight="800"
      fill="url(#silver)"
      letter-spacing="12"
    >
      KEDANTRA
    </text>

    <text
      x="700"
      y="260"
      text-anchor="middle"
      class="cinzel"
      font-size="190"
      font-weight="700"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="2.4"
      opacity="0.5"
      letter-spacing="12"
    >
      KEDANTRA
    </text>
  </g>
</svg>
